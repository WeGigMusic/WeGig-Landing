<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>WeGig — Feedback</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    :root {
      --bg: #000000;
      --text-main: #f9fafb;
      --text-muted: #9ca3af;
      --accent-blue: #1e88ff;
      --radius-lg: 20px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "SF Pro Text",
                   "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text-main);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    nav {
      width: 100%;
      padding: 20px 24px;
      display: flex;
      justify-content: center;
      gap: 28px;
    }

    nav a {
      color: var(--text-muted);
      text-decoration: none;
      font-size: 14px;
      transition: 0.15s ease;
    }

    nav a:hover {
      color: var(--text-main);
    }

    .container {
      flex: 1;
      display: flex;
      justify-content: center;
      padding: 24px;
    }

    .page {
      width: 100%;
      max-width: 760px;
    }

    .logo {
      max-width: 220px;
      width: 60%;
      height: auto;
      margin: 8px auto 28px;
      display: block;
    }

    .card {
      background: #050812;
      border: 1px solid #1f2937;
      border-radius: var(--radius-lg);
      padding: 28px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.7);
      margin-bottom: 18px;
    }

    h1 {
      font-size: 30px;
      line-height: 1.1;
      margin-bottom: 14px;
      text-align: center;
    }

    h2 {
      font-size: 18px;
      line-height: 1.25;
      margin-bottom: 12px;
      color: var(--text-main);
    }

    h3 {
      font-size: 16px;
      line-height: 1.3;
      margin-bottom: 6px;
      color: var(--text-main);
    }

    p {
      color: var(--text-muted);
      font-size: 15px;
      line-height: 1.65;
    }

    .intro {
      text-align: center;
      margin-bottom: 8px;
    }

    .form-grid {
      display: grid;
      gap: 16px;
      margin-top: 18px;
    }

    .form-group {
      display: grid;
      gap: 8px;
    }

    label {
      color: var(--text-main);
      font-size: 14px;
      font-weight: 600;
    }

    input,
    textarea,
    select {
      width: 100%;
      border: 1px solid #1f2937;
      border-radius: 14px;
      background: #000;
      color: var(--text-main);
      padding: 14px 16px;
      font: inherit;
      outline: none;
    }

    input::placeholder,
    textarea::placeholder {
      color: #6b7280;
    }

    input:focus,
    textarea:focus,
    select:focus {
      border-color: var(--accent-blue);
    }

    textarea {
      min-height: 130px;
      resize: vertical;
    }

    .honeypot {
      display: none;
    }

    .submit-row {
      margin-top: 4px;
      display: flex;
      justify-content: center;
    }

    button,
    .button-like {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: #000;
      border-radius: 999px;
      padding: 10px 18px;
      border: 1px solid #fff;
      color: var(--text-main);
      text-decoration: none;
      transition: 0.08s ease;
      font-size: 14px;
      cursor: pointer;
    }

    button:hover,
    .button-like:hover {
      transform: translateY(-1px);
      border-color: var(--accent-blue);
      box-shadow: 0 10px 30px rgba(15,23,42,0.9);
    }

    button:disabled {
      opacity: 0.45;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    .helper,
    .note {
      margin-top: 14px;
      text-align: center;
      font-size: 13px;
      color: var(--text-muted);
    }

    .success {
      margin-top: 16px;
      text-align: center;
      font-size: 14px;
      color: #7dd3fc;
      font-weight: 600;
    }

    .success.error {
      color: #fca5a5;
    }

    .toolbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 14px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }

    .toolbar-right {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }

    .small-select {
      min-width: 170px;
      padding: 10px 12px;
      border-radius: 999px;
    }

    .idea-list {
      display: grid;
      gap: 14px;
    }

    .idea {
      display: grid;
      grid-template-columns: 84px 1fr;
      gap: 16px;
      align-items: start;
      padding: 18px;
      border: 1px solid #1f2937;
      border-radius: 18px;
      background: rgba(0,0,0,0.3);
    }

    .vote-box {
      background: #000;
      border: 1px solid #1f2937;
      border-radius: 16px;
      padding: 12px 10px;
      text-align: center;
      min-width: 84px;
    }

    .vote-count {
      font-size: 22px;
      font-weight: 800;
      color: var(--text-main);
      line-height: 1;
      margin-bottom: 10px;
    }

    .vote-label {
      font-size: 12px;
      color: var(--text-muted);
      margin-bottom: 10px;
    }

    .vote-button {
      width: 100%;
      padding: 8px 0;
      font-size: 13px;
    }

    .idea-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 10px;
      flex-wrap: wrap;
    }

    .idea-meta {
      margin-top: 10px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }

    .status,
    .tag {
      display: inline-block;
      padding: 6px 10px;
      border-radius: 999px;
      border: 1px solid #1f2937;
      color: var(--text-muted);
      font-size: 12px;
      font-weight: 600;
      background: #000;
    }

    .status-open { color: #d1d5db; }
    .status-planned { color: #93c5fd; }
    .status-future { color: #c4b5fd; }
    .status-under-review { color: #fcd34d; }

    .empty-state {
      text-align: center;
      color: var(--text-muted);
      padding: 24px 12px 10px;
    }

    footer {
      margin-top: 4px;
      text-align: center;
      font-size: 11px;
      color: var(--text-muted);
      opacity: 0.75;
    }

    @media (max-width: 640px) {
      nav {
        gap: 16px;
        padding: 16px;
      }

      nav a {
        font-size: 13px;
      }

      .card {
        padding: 22px;
      }

      h1 {
        font-size: 26px;
      }

      p {
        font-size: 14px;
      }

      .idea {
        grid-template-columns: 1fr;
      }

      .vote-box {
        width: 100%;
        max-width: 120px;
      }

      .toolbar {
        align-items: stretch;
      }

      .toolbar-right {
        width: 100%;
      }

      .small-select {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <nav>
    <a href="/">Home</a>
    <a href="/story/">Story</a>
    <a href="/privacy/">Privacy</a>
  </nav>

  <div class="container">
    <main class="page">
      <img src="/images/wegig-logo.png?v=2" alt="WeGig" class="logo" />

      <section class="card">
        <h1>Help shape WeGig</h1>
        <p class="intro">
          Share ideas, vote on what matters, and help decide what gets built next.
        </p>

        <form id="feedbackForm">
          <div class="form-grid">
            <div class="form-group">
              <label for="title">Feature title</label>
              <input
                id="title"
                name="title"
                type="text"
                maxlength="100"
                placeholder="Example: Add set lists"
                required
              />
            </div>

            <div class="form-group">
              <label for="details">Why is this useful?</label>
              <textarea
                id="details"
                name="details"
                maxlength="500"
                placeholder="Describe the feature, problem, or idea"
                required
              ></textarea>
            </div>

            <div class="honeypot" aria-hidden="true">
              <label for="website">Website</label>
              <input
                id="website"
                name="website"
                type="text"
                autocomplete="off"
                tabindex="-1"
              />
            </div>

            <div class="submit-row">
              <button type="submit">Submit feedback</button>
            </div>
          </div>
        </form>

        <p class="helper">
          Suggestions are shared with the WeGig roadmap and help decide what gets built next.
        </p>

        <div id="successMessage" class="success" style="display:none;">
          Feedback submitted.
        </div>
      </section>

      <section class="card">
        <div class="toolbar">
          <h2>Feature requests</h2>
          <div class="toolbar-right">
            <select id="sortSelect" class="small-select">
              <option value="votes">Sort: Most votes</option>
              <option value="newest">Sort: Newest</option>
              <option value="oldest">Sort: Oldest</option>
            </select>
          </div>
        </div>

        <div id="ideaList" class="idea-list"></div>
        <div id="emptyState" class="empty-state" style="display:none;">
          Loading feedback...
        </div>
      </section>

      <footer>&copy; <span id="year"></span> WeGig. All rights reserved.</footer>
    </main>
  </div>

  <script>
    const API_URL = "https://nvmviixlivbxuwvfqwujx.supabase.co/functions/v1/feedback";
    const VOTER_KEY = "wegig.feedback.voter.v1";
    const LOCAL_VOTED_KEY = "wegig.feedback.localVotes.v1";

    const form = document.getElementById("feedbackForm");
    const titleInput = document.getElementById("title");
    const detailsInput = document.getElementById("details");
    const websiteInput = document.getElementById("website");
    const ideaList = document.getElementById("ideaList");
    const emptyState = document.getElementById("emptyState");
    const successMessage = document.getElementById("successMessage");
    const sortSelect = document.getElementById("sortSelect");

    let ideas = [];

    function getVoterId() {
      let id = localStorage.getItem(VOTER_KEY);

      if (!id) {
        id = crypto.randomUUID();
        localStorage.setItem(VOTER_KEY, id);
      }

      return id;
    }

    function getLocalVotedIds() {
      const raw = localStorage.getItem(LOCAL_VOTED_KEY);
      if (!raw) return [];

      try {
        const parsed = JSON.parse(raw);
        return Array.isArray(parsed) ? parsed : [];
      } catch {
        return [];
      }
    }

    function saveLocalVotedId(id) {
      const existing = getLocalVotedIds();
      if (existing.includes(id)) return;
      localStorage.setItem(LOCAL_VOTED_KEY, JSON.stringify([...existing, id]));
    }

    function escapeHtml(value) {
      return String(value)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function statusClass(status) {
      const normalized = String(status || "Open").toLowerCase().replace(/\s+/g, "-");
      return "status status-" + normalized;
    }

    function showMessage(message, isError) {
      successMessage.textContent = message;
      successMessage.classList.toggle("error", Boolean(isError));
      successMessage.style.display = "block";

      setTimeout(() => {
        successMessage.style.display = "none";
      }, 2400);
    }

    function sortItems(items) {
      const sortBy = sortSelect.value;

      if (sortBy === "newest") {
        return [...items].sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
      }

      if (sortBy === "oldest") {
        return [...items].sort((a, b) => new Date(a.created_at) - new Date(b.created_at));
      }

      return [...items].sort((a, b) => {
        if (Number(b.votes_count || 0) !== Number(a.votes_count || 0)) {
          return Number(b.votes_count || 0) - Number(a.votes_count || 0);
        }

        return new Date(b.created_at) - new Date(a.created_at);
      });
    }

    async function fetchIdeas() {
      emptyState.style.display = "block";
      emptyState.textContent = "Loading feedback...";

      const response = await fetch(API_URL);
      const data = await response.json();

      if (!response.ok) {
        throw new Error(data.error || "Could not load feedback.");
      }

      ideas = data.ideas || [];
      renderIdeas();
    }

    function renderIdeas() {
      const sortedIdeas = sortItems(ideas);
      const localVotedIds = getLocalVotedIds();

      if (sortedIdeas.length === 0) {
        ideaList.innerHTML = "";
        emptyState.style.display = "block";
        emptyState.textContent = "No ideas yet. Be the first to add one.";
        return;
      }

      emptyState.style.display = "none";

      ideaList.innerHTML = sortedIdeas.map((item) => {
        const hasVoted = localVotedIds.includes(item.id);

        return `
          <article class="idea">
            <div class="vote-box">
              <div class="vote-count">${Number(item.votes_count || 0)}</div>
              <div class="vote-label">votes</div>
              <button
                class="vote-button"
                type="button"
                data-id="${escapeHtml(item.id)}"
                ${hasVoted ? "disabled" : ""}
              >
                ${hasVoted ? "Voted" : "Upvote"}
              </button>
            </div>

            <div>
              <div class="idea-top">
                <h3>${escapeHtml(item.title)}</h3>
              </div>
              <p>${escapeHtml(item.details)}</p>
              <div class="idea-meta">
                <span class="${statusClass(item.status)}">${escapeHtml(item.status || "Open")}</span>
                <span class="tag">${new Date(item.created_at).toLocaleDateString("en-GB", {
                  day: "2-digit",
                  month: "short",
                  year: "numeric"
                })}</span>
              </div>
            </div>
          </article>
        `;
      }).join("");

      ideaList.querySelectorAll(".vote-button").forEach((button) => {
        button.addEventListener("click", async function () {
          await upvoteIdea(this.getAttribute("data-id"), this);
        });
      });
    }

    async function upvoteIdea(id, button) {
      if (!id || button.disabled) return;

      button.disabled = true;
      button.textContent = "Voting...";

      try {
        const response = await fetch(API_URL, {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            action: "vote",
            ideaId: id,
            voterId: getVoterId()
          })
        });

        const data = await response.json();

        if (!response.ok) {
          if (response.status === 409 || data.error === "Already voted") {
            saveLocalVotedId(id);
            button.textContent = "Voted";
            return;
          }

          button.disabled = false;
          button.textContent = "Upvote";
          showMessage(data.error || "Could not vote. Try again.", true);
          return;
        }

        saveLocalVotedId(id);
        button.textContent = "Voted";
        await fetchIdeas();
      } catch {
        button.disabled = false;
        button.textContent = "Upvote";
        showMessage("Could not vote. Check your connection and try again.", true);
      }
    }

    form.addEventListener("submit", async function (event) {
      event.preventDefault();

      const title = titleInput.value.trim();
      const details = detailsInput.value.trim();
      const website = websiteInput.value.trim();

      if (!title || !details) return;

      const submitButton = form.querySelector("button[type='submit']");
      submitButton.disabled = true;
      submitButton.textContent = "Submitting...";

      try {
        const response = await fetch(API_URL, {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            action: "create",
            title,
            details,
            website,
            voterId: getVoterId()
          })
        });

        const data = await response.json();

        if (!response.ok) {
          showMessage(data.error || "Could not submit feedback.", true);
          return;
        }

        form.reset();
        showMessage("Feedback submitted.", false);
        await fetchIdeas();
      } catch {
        showMessage("Could not submit feedback. Check your connection and try again.", true);
      } finally {
        submitButton.disabled = false;
        submitButton.textContent = "Submit feedback";
      }
    });

    sortSelect.addEventListener("change", renderIdeas);

    document.getElementById("year").textContent = new Date().getFullYear();

    fetchIdeas().catch(() => {
      ideaList.innerHTML = "";
      emptyState.style.display = "block";
      emptyState.textContent = "Could not load feedback yet.";
    });
  </script>
</body>
</html>
