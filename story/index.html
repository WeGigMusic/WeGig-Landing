  <h1>The story behind WeGig</h1>

  <p>WeGig exists to give live music experiences a proper home.</p>

  <p>People track films, books, and travel — but gigs often disappear into photos and memory.</p>

  <p>WeGig is being built to help people track gigs, remember moments, and connect through live music.</p>
