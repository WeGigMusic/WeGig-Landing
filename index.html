<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>WeGig – Track your gigs, relive your music, discover what’s next.</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    :root {
      --bg: #000000;
      --text-main: #f9fafb;
      --text-muted: #9ca3af;
      --accent-blue: #1e88ff;
      --radius-lg: 20px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "SF Pro Text",
                   "Segoe UI", sans-serif;
      background: #000;
      color: var(--text-main);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .page {
      width: 100%;
      max-width: 540px;
      text-align: center;
    }

    .logo {
      max-width: 220px;
      width: 70%;
      height: auto;
      margin: 0 auto 18px;
      display: block;
    }

    .tagline {
      font-size: 17px;
      line-height: 1.35;
      margin-bottom: 24px;
    }

    .qr-wrapper {
      display: inline-flex;
      padding: 14px;
      border-radius: var(--radius-lg);
      background: #050812;
      border: 1px solid #1f2937;
      margin-bottom: 24px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.7);
    }

    .qr-wrapper img {
      width: 190px;
      height: 190px;
      border-radius: 14px;
      background: #fff;
      object-fit: contain;
    }

    .hint {
      font-size: 13px;
      color: var(--text-muted);
      margin-bottom: 20px;
    }

    .store-buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      justify-content: center;
      margin-bottom: 16px;
    }

    .store-buttons a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: #000;
      border-radius: 999px;
      padding: 8px 16px;
      border: 1px solid #fff;
      text-decoration: none;
      transition: 0.08s ease;
    }

    .store-buttons a:hover {
      transform: translateY(-1px);
      border-color: var(--accent-blue);
      box-shadow: 0 10px 30px rgba(15,23,42,0.9);
    }

    .store-buttons img {
      height: 32px;
      width: auto;
      display: block;
    }

    footer {
      margin-top: 12px;
      font-size: 11px;
      color: var(--text-muted);
      opacity: 0.75;
    }

    @media (max-width: 480px) {
      .tagline { font-size: 16px; }
      .qr-wrapper img { width: 170px; height: 170px; }
      .store-buttons img { height: 28px; }
    }
  </style>
</head>

<body>
  <main class="page">
    <img src="images/wegig-logo.png?v=2" alt="WeGig" class="logo" />

    <p class="tagline">Track your gigs, relive your music, discover what’s next.</p>

    <div class="qr-wrapper">
      <img src="images/wegig-qr.png?v=2" alt="Scan to download the WeGig app" />
    </div>

    <p class="hint">
      Scan the QR code or tap a store below to open WeGig on your phone once the app is live.
    </p>

    <div class="store-buttons">
      <a href="#"><img src="images/app-store-badge.png" alt="Download on the App Store" /></a>
      <a href="#"><img src="images/google-play-badge.png" alt="Get it on Google Play" /></a>
    </div>

    <footer>&copy; <span id="year"></span> WeGig. All rights reserved.</footer>
  </main>

  <script>
    document.getElementById("year").textContent = new Date().getFullYear();
  </script>
</body>
</html>
